ai-search:
  embedding:
    provider: stub
  elasticsearch-url: ${AI_SEARCH_ES_URL:http://localhost:9200}
  username: ${AI_SEARCH_ES_USERNAME:elastic}
  password: ${AI_SEARCH_ES_PASSWORD:password}
  model-key: ${AI_SEARCH_MODEL_KEY:test}
  model-path-segment: ${AI_SEARCH_MODEL_PATH_SEGMENT:multilingual-e5-small-ko-v2}
  index-name: ${AI_SEARCH_ES_INDEX:food-products-${ai-search.model-key}}
  read-alias: ${AI_SEARCH_ES_READ_ALIAS:${ai-search.index-name}-read}
  synonyms-set: ${AI_SEARCH_SYNONYMS_SET:food-synonyms}
  synonyms-file-path: ${AI_SEARCH_SYNONYMS_FILE_PATH:classpath:es/dictionary/synonyms_ko.txt}
  synonyms-regression-file-path: ${AI_SEARCH_SYNONYMS_REGRESSION_FILE_PATH:classpath:es/dictionary/synonyms_kr_regression.txt}
  ## **  embedding-model-path 우선 적용하며, 없으면 model-url 사용함  **
  embedding-model-path: ${AI_SEARCH_EMBED_MODEL_PATH:classpath:/model/${ai-search.model-path-segment}}
  embedding-model-url: ${AI_SEARCH_EMBED_MODEL:djl://ai.djl.huggingface.pytorch/multilingual-e5-small-ko-v2}
  min-score-threshold: ${AI_SEARCH_MIN_SCORE:0.71}
  index-retention-count: ${AI_SEARCH_INDEX_RETENTION_COUNT:3}
  category-boost-cache-ttl-seconds: ${AI_SEARCH_CATEGORY_BOOST_CACHE_TTL_SECONDS:300}
  query-embedding-cache-ttl-seconds: ${AI_SEARCH_QUERY_EMBED_CACHE_TTL_SECONDS:300}
  query-embedding-cache-max-size: ${AI_SEARCH_QUERY_EMBED_CACHE_MAX_SIZE:5000}
  query-embedding-timeout-millis: ${AI_SEARCH_QUERY_EMBED_TIMEOUT_MILLIS:1500}
  query-embedding-executor-threads: ${AI_SEARCH_QUERY_EMBED_THREADS:2}
  k8s:
    auto-port-forward: ${AI_SEARCH_AUTO_PORT_FORWARD:true}
    namespace: ${AI_SEARCH_K8S_NAMESPACE:ai-search}
    service-name: ${AI_SEARCH_K8S_SERVICE:}
    secret-name: ${AI_SEARCH_K8S_SECRET:ai-search-es-es-elastic-user}
    local-port: ${AI_SEARCH_K8S_LOCAL_PORT:9200}
    remote-port: ${AI_SEARCH_K8S_REMOTE_PORT:9200}
